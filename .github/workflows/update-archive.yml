name: Update Authors Electric archive

on:
  workflow_dispatch:
  schedule:
    - cron: "17 04 * * *"
      timezone: "Europe/London"

concurrency:
  group: authors-electric-archive
  cancel-in-progress: false

permissions:
  contents: write
  pages: write
  id-token: write

env:
  GH_TOKEN: ${{ github.token }}

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Run safety tests
        run: npm test

      - name: Update archive and preservation copies
        run: npm run update

      - name: Commit verified archive changes
        run: |
          git config user.name "golden-duck-archive-bot"
          git config user.email "golden-duck-archive-bot@users.noreply.github.com"
          git add public snapshots backup automation-heartbeat.txt
          if git diff --cached --quiet; then
            echo "No repository changes to commit."
          else
            git commit -m "Update Authors Electric archive [skip ci]"
            git push
          fi

      - name: Prepare complete archive download
        run: |
          npm run bundle
          cd dist
          zip -r -q julia-jones-authors-electric-archive.zip Julia-Jones-Authors-Electric-Archive

      - name: Publish complete archive download when needed
        run: |
          ARCHIVE_STATE=$(node -e "const fs=require('fs');const x=JSON.parse(fs.readFileSync('public/data/status.json','utf8'));process.stdout.write(String(x.state||''));")
          RELEASE_COUNT=$(gh release list --limit 1 --json tagName --jq 'length')
          if [ "$ARCHIVE_STATE" = "updated" ] || [ "$RELEASE_COUNT" = "0" ]; then
            TAG="archive-$(date -u +'%Y%m%d-%H%M%S')"
            VERIFIED=$(node -e "const fs=require('fs');const x=JSON.parse(fs.readFileSync('public/data/archive-latest.json','utf8'));process.stdout.write(String(x.generatedAt||''));")
            gh release create "$TAG" \
              dist/julia-jones-authors-electric-archive.zip \
              --title "Julia Jones Authors Electric archive — $VERIFIED" \
              --notes "Automatically generated complete archive download. Includes the public index, preserved article pages, raw article records, mirrored images, duplicate audit data and dated metadata snapshots."
          else
            echo "Archive content is unchanged and a complete download already exists."
          fi

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages files
        uses: actions/upload-pages-artifact@v4
        with:
          path: public

      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
